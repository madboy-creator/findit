<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Item Details')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 max-w-4xl mx-auto px-4">
    <div class="bg-white shadow rounded-lg overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 bg-gradient-to-r from-indigo-600 to-purple-600">
            <div class="flex justify-between items-start">
                <div class="text-white">
                    <h1 class="text-2xl font-bold" th:text="${item.title}"></h1>
                    <div class="mt-2 flex gap-2">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                              th:class="${item.type == 'FOUND'} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                              th:text="${item.type}"></span>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-white bg-opacity-20 text-white"
                              th:text="${item.status}"></span>
                    </div>
                </div>
                <a href="/search" class="text-white hover:text-indigo-200"><i class="fas fa-arrow-left mr-1"></i> Back</a>
            </div>
        </div>
        
        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div><h3 class="text-sm font-medium text-gray-500">Category</h3><p class="mt-1 text-gray-900" th:text="${item.category}"></p></div>
                <div><h3 class="text-sm font-medium text-gray-500">Location</h3><p class="mt-1 text-gray-900" th:text="${item.location}"></p></div>
                <div th:if="${item.type == 'LOST'}"><h3 class="text-sm font-medium text-gray-500">Date Lost</h3><p class="mt-1 text-gray-900" th:text="${item.dateLost}"></p></div>
                <div th:if="${item.type == 'FOUND'}"><h3 class="text-sm font-medium text-gray-500">Date Found</h3><p class="mt-1 text-gray-900" th:text="${item.dateFound}"></p></div>
                <div><h3 class="text-sm font-medium text-gray-500">Reported By</h3><p class="mt-1 text-gray-900" th:text="${item.reporter.name}"></p></div>
                <div><h3 class="text-sm font-medium text-gray-500">Reported On</h3><p class="mt-1 text-gray-900" th:text="${item.createdAt}"></p></div>
            </div>
            
            <div th:if="${item.description}" class="mb-6">
                <h3 class="text-sm font-medium text-gray-500">Description</h3>
                <p class="mt-2 text-gray-700 whitespace-pre-wrap" th:text="${item.description}"></p>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-200 flex gap-3">
                <a th:href="@{/claim/submit/{id}(id=${item.id})}" th:if="${item.type == 'FOUND' and item.status != 'CLAIMED'}" class="px-6 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
                    <i class="fas fa-hand-holding-heart mr-2"></i> Claim This Item
                </a>
                <a href="/search" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Back to Search</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
