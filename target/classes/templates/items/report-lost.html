<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Report Lost Item')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 max-w-3xl mx-auto px-4">
    <div class="bg-white shadow rounded-lg overflow-hidden">
        <div class="px-6 py-5 bg-gradient-to-r from-red-600 to-pink-600">
            <div class="flex items-center">
                <i class="fas fa-search-minus text-white text-3xl mr-3"></i>
                <div>
                    <h2 class="text-2xl font-bold text-white">Report Lost Item</h2>
                    <p class="text-red-100 mt-1">Get help finding what you've lost</p>
                </div>
            </div>
        </div>
        
        <form method="post" th:action="@{/report-lost}" class="p-6 space-y-6">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Item Title *</label><input type="text" name="title" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-red-500" placeholder="e.g., MacBook Pro, House Keys"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Category *</label><select name="category" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-red-500"><option>Electronics</option><option>Documents</option><option>Keys</option><option>Accessories</option><option>Clothing</option><option>Books</option><option>Bags</option><option>Wallet/Purse</option><option>Phone</option><option>Jewelry</option><option>Other</option></select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Lost Location *</label><input type="text" name="location" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-red-500" placeholder="e.g., Library 2nd Floor, Cafeteria"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date Lost *</label><input type="date" name="dateLost" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-red-500"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Description *</label><textarea name="description" rows="5" required class="w-full rounded-md border-gray-300 shadow-sm focus:border-red-500" placeholder="Describe your item in detail: brand, color, size, unique marks..."></textarea></div>
            
            <div class="bg-yellow-50 rounded-lg p-4 border border-yellow-200">
                <div class="flex items-start"><i class="fas fa-clock text-yellow-600 mt-0.5 mr-2"></i><div><h3 class="text-sm font-medium text-yellow-800">What to do next?</h3><p class="text-sm text-yellow-700">Check the Campus Security Office (Building A, Room 101) and Lost & Found box.</p></div></div>
            </div>
            
            <button type="submit" class="w-full px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">Report Lost Item</button>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
