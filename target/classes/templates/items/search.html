<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header"></head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container" style="padding: 32px 24px;">
    <h1>Search Items</h1>

    <div class="card" style="margin-bottom: 32px;">
        <div class="card-body">
            <form method="get" th:action="@{/search}"
                  style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">

                <input type="text" name="keyword" class="form-control"
                       placeholder="Search by title, description, location..."
                       th:value="${keyword}"
                       style="flex: 2; min-width: 200px;"/>

                <!-- Fixed: th:value doesn't work on select; use th:selected on each option -->
                <select name="category" class="form-select" style="flex: 1; min-width: 140px;">
                    <option value="" th:selected="${category == null or category == ''}">All Categories</option>
                    <option value="PHONE"        th:selected="${category == 'PHONE'}">📱 Phone</option>
                    <option value="LAPTOP"       th:selected="${category == 'LAPTOP'}">💻 Laptop</option>
                    <option value="ID_CARD"      th:selected="${category == 'ID_CARD'}">🪪 ID Card</option>
                    <option value="WATER_BOTTLE" th:selected="${category == 'WATER_BOTTLE'}">💧 Water Bottle</option>
                    <option value="KEYS"         th:selected="${category == 'KEYS'}">🔑 Keys</option>
                    <option value="WALLET"       th:selected="${category == 'WALLET'}">👛 Wallet</option>
                    <option value="BOOK"         th:selected="${category == 'BOOK'}">📚 Book</option>
                    <option value="BAG"          th:selected="${category == 'BAG'}">🎒 Bag</option>
                    <option value="GLASSES"      th:selected="${category == 'GLASSES'}">👓 Glasses</option>
                    <option value="CHARGER"      th:selected="${category == 'CHARGER'}">🔌 Charger</option>
                    <option value="OTHER"        th:selected="${category == 'OTHER'}">📦 Other</option>
                </select>

                <select name="lost" class="form-select" style="flex: 1; min-width: 120px;">
                    <option value="false" th:selected="${not isLost}">Found Items</option>
                    <option value="true"  th:selected="${isLost}">Lost Items</option>
                </select>

                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3><span th:text="${#lists.size(items)}"></span> items found</h3>
    </div>

    <div th:if="${#lists.isEmpty(items)}"
         style="text-align: center; padding: 64px;">
        <p style="color: #6b7280; margin-bottom: 16px;">No items found. Try adjusting your search.</p>
        <a href="/report-found" class="btn btn-primary">Report a Found Item</a>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(items)}">
        <div class="col-4" th:each="item : ${items}" style="margin-bottom: 24px;">
            <div class="card" style="height: 100%;">

                <!-- Photo or placeholder -->
                <div th:if="${item.photoUrl}"
                     style="height: 160px; overflow: hidden;">
                    <img th:src="${item.photoUrl}"
                         alt="Item photo"
                         style="width: 100%; height: 100%; object-fit: cover;"/>
                </div>
                <div th:unless="${item.photoUrl}"
                     style="height: 160px; background: #f3f4f6; display: flex;
                            align-items: center; justify-content: center; font-size: 48px;">
                    <span th:text="${item.categoryIcon}">📦</span>
                </div>

                <div class="card-body">
                    <div style="display: flex; justify-content: space-between;
                                align-items: center; margin-bottom: 8px;">
                        <strong>
                            <a th:href="@{/item/{id}(id=${item.id})}"
                               th:text="${item.title}"
                               style="color: #333;"></a>
                        </strong>
                        <span class="badge"
                              th:class="${item.lost} ? 'badge-pending' : 'badge-approved'"
                              th:text="${item.lost} ? 'Lost' : 'Found'">
                        </span>
                    </div>

                    <div style="font-size: 13px; color: #6b7280; margin-bottom: 4px;">
                        📍 <span th:text="${item.location}"></span>
                    </div>
                    <div style="font-size: 13px; color: #6b7280; margin-bottom: 12px;">
                        📅 <span th:text="${item.formattedCreatedAt}"></span>
                    </div>

                    <!-- Fixed: null-safe description truncation -->
                    <p style="font-size: 13px; color: #374151;"
                       th:text="${item.description != null and item.description.length() > 100}
                                 ? ${item.description.substring(0, 100) + '...'}
                                 : ${item.description}">
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 32px; border-top: 1px solid #e5e7eb; margin-top: 32px;">
    <p>© 2024 FindIt - Campus Lost &amp; Found System | CST</p>
</footer>

</body>
</html>
