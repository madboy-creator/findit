<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Dashboard')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 px-4">
    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl shadow-lg p-6 mb-8 text-white">
        <h1 class="text-2xl font-bold mb-2" th:text="'Welcome, ' + ${userName} + '!'">Welcome!</h1>
        <p>Track your lost and found items, manage claims, and recover what matters most.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <a href="/report-lost" class="bg-white rounded-lg shadow p-5 hover:shadow-lg text-center">
            <i class="fas fa-search-minus text-red-600 text-3xl mb-2"></i>
            <h3 class="font-medium">Report Lost</h3>
        </a>
        <a href="/report-found" class="bg-white rounded-lg shadow p-5 hover:shadow-lg text-center">
            <i class="fas fa-search-plus text-green-600 text-3xl mb-2"></i>
            <h3 class="font-medium">Report Found</h3>
        </a>
        <a href="/search" class="bg-white rounded-lg shadow p-5 hover:shadow-lg text-center">
            <i class="fas fa-search text-blue-600 text-3xl mb-2"></i>
            <h3 class="font-medium">Search Items</h3>
        </a>
        <a href="/my-claims" class="bg-white rounded-lg shadow p-5 hover:shadow-lg text-center">
            <i class="fas fa-clipboard-list text-purple-600 text-3xl mb-2"></i>
            <h3 class="font-medium">My Claims</h3>
        </a>
    </div>

    <!-- Recent Found Items -->
    <div class="bg-white shadow rounded-lg p-6 mb-6" th:if="${recentFoundItems != null and !#lists.isEmpty(recentFoundItems)}">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-gray-800">Recently Found</h2>
            <a href="/search?type=FOUND" class="text-indigo-600 text-sm hover:underline">View All ?</a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div th:each="item : ${recentFoundItems}" class="border rounded-lg p-3 hover:shadow-md">
                <a th:href="@{/item/{id}(id=${item.id})}" class="font-semibold text-gray-900 hover:text-indigo-600" th:text="${item.title}"></a>
                <p class="text-sm text-gray-500" th:text="${item.location}"></p>
                <span class="inline-block mt-2 px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full">FOUND</span>
            </div>
        </div>
    </div>

    <!-- Recent Lost Items -->
    <div class="bg-white shadow rounded-lg p-6" th:if="${recentLostItems != null and !#lists.isEmpty(recentLostItems)}">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-gray-800">Recently Lost</h2>
            <a href="/search?type=LOST" class="text-indigo-600 text-sm hover:underline">View All ?</a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div th:each="item : ${recentLostItems}" class="border rounded-lg p-3 hover:shadow-md">
                <a th:href="@{/item/{id}(id=${item.id})}" class="font-semibold text-gray-900 hover:text-indigo-600" th:text="${item.title}"></a>
                <p class="text-sm text-gray-500" th:text="${item.location}"></p>
                <span class="inline-block mt-2 px-2 py-1 bg-red-100 text-red-800 text-xs rounded-full">LOST</span>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
