<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - FindIt'">FindIt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50" x-data="{ mobileMenuOpen: false }">

<nav th:fragment="navbar" class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <a href="/dashboard" class="flex-shrink-0 flex items-center space-x-2">
                    <i class="fas fa-search text-indigo-600 text-2xl"></i>
                    <span class="font-bold text-xl text-gray-800">FindIt</span>
                </a>
                <div class="hidden md:ml-6 md:flex md:space-x-4">
                    <a href="/" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium"><i class="fas fa-home mr-1"></i> Home</a>
<a href="/dashboard" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                    <a href="/report-lost" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">Report Lost</a>
                    <a href="/report-found" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">Report Found</a>
                    <a href="/search" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium"><i class="fas fa-search mr-1"></i> Search</a>
                    <a href="/my-items" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">My Items</a>
                    <a href="/my-claims" class="text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium">My Claims</a>
                    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        <a href="/admin/dashboard" class="text-indigo-600 hover:bg-indigo-50 px-3 py-2 rounded-md text-sm font-medium">Admin Panel</a>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-sm text-gray-600 hidden md:inline" th:text="'Hi, ' + ${#authentication.name}"></span>
                <form method="post" th:action="@{/logout}" class="inline">
                    <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-md text-sm font-medium">Logout</button>
                </form>
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-gray-600 focus:outline-none"><i class="fas fa-bars text-xl"></i></button>
            </div>
        </div>
    </div>
    <div x-show="mobileMenuOpen" x-cloak class="md:hidden border-t border-gray-200">
        <div class="px-2 pt-2 pb-3 space-y-1">
            <a href="/dashboard" class="block text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-base font-medium">Dashboard</a>
            <a href="/report-lost" class="block text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-base font-medium">Report Lost</a>
            <a href="/report-found" class="block text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-base font-medium">Report Found</a>
            <a href="/search" class="block text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-base font-medium">Search</a>
            <a href="/my-items" class="block text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-base font-medium">My Items</a>
            <a href="/my-claims" class="block text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-base font-medium">My Claims</a>
            <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <a href="/admin/dashboard" class="block text-indigo-600 hover:bg-indigo-50 px-3 py-2 rounded-md text-base font-medium">Admin Panel</a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
            <p class="text-gray-500 text-sm">© 2026 FindIt - Campus Lost & Found System | CST</p>
            <div class="flex space-x-6">
                <a href="#" class="text-gray-400 hover:text-gray-500"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-gray-400 hover:text-gray-500"><i class="fab fa-github"></i></a>
                <a href="#" class="text-gray-400 hover:text-gray-500"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
