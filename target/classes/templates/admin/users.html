<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Manage Users')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 px-4">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Manage Users</h1>
        <div class="flex gap-2">
            <input type="text" id="searchInput" placeholder="Search users..." class="px-3 py-2 border rounded-md" th:value="${searchQuery}">
            <button onclick="searchUsers()" class="bg-indigo-600 text-white px-4 py-2 rounded-md">Search</button>
        </div>
    </div>
    
    <!-- Success/Error Messages -->
    <div th:if="${param.updated}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
        ✅ User updated successfully!
    </div>
    <div th:if="${param.deleted}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
        ✅ User deleted successfully!
    </div>
    <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        ❌ Error! Cannot delete your own account.
    </div>
    
    <div class="bg-white shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Student ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="user : ${users}">
                    <td class="px-6 py-4 text-sm" th:text="${user.id}">1</td>
                    <td class="px-6 py-4 text-sm font-medium" th:text="${user.name}">John Doe</td>
                    <td class="px-6 py-4 text-sm" th:text="${user.email}">john@example.com</td>
                    <td class="px-6 py-4 text-sm" th:text="${user.studentId}">STU001</td>
                    <td class="px-6 py-4">
                        <form method="post" th:action="@{/admin/user/{id}/role(id=${user.id})}" class="inline">
                            <select name="role" onchange="this.form.submit()" class="text-sm border rounded px-2 py-1">
                                <option value="STUDENT" th:selected="${user.role == 'STUDENT'}">Student</option>
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                            </select>
                        </form>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${user.enabled}" class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full">✅ Active</span>
                        <span th:if="${!user.enabled}" class="px-2 py-1 bg-red-100 text-red-800 text-xs rounded-full">❌ Disabled</span>
                    </td>
                    <td class="px-6 py-4 text-sm space-x-2">
                        <!-- Toggle Enable/Disable Form -->
                        <form method="post" th:action="@{/admin/user/{id}/toggle(id=${user.id})}" class="inline">
                            <button type="submit" 
                                    th:class="${user.enabled} ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'"
                                    class="text-white px-3 py-1 rounded text-xs">
                                <span th:if="${user.enabled}">🔴 Disable</span>
                                <span th:if="${!user.enabled}">🟢 Enable</span>
                            </button>
                        </form>
                        
                        <!-- Delete Form -->
                        <form method="post" th:action="@{/admin/user/{id}/delete(id=${user.id})}" class="inline" 
                              onsubmit="return confirm('⚠️ Are you sure you want to delete this user? This will also delete all their items and claims. This action cannot be undone!');">
                            <button type="submit" class="bg-red-600 text-white px-3 py-1 rounded text-xs hover:bg-red-700">
                                🗑️ Delete
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7" class="px-6 py-8 text-center text-gray-500">📭 No users found</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function searchUsers() {
        var query = document.getElementById('searchInput').value;
        window.location.href = '/admin/users?search=' + encodeURIComponent(query);
    }
    
    // Press Enter key to search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchUsers();
        }
    });
</script>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
