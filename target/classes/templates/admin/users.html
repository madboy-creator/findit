<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Manage Users')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 px-4">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Manage Users</h1>
    
    <div class="bg-white shadow rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Student ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="user : ${users}">
                    <td class="px-6 py-4" th:text="${user.name}"></td>
                    <td class="px-6 py-4" th:text="${user.email}"></td>
                    <td class="px-6 py-4" th:text="${user.studentId}"></td>
                    <td class="px-6 py-4">
                        <span th:if="${user.role == 'ADMIN'}" class="px-2 py-1 bg-purple-100 text-purple-800 rounded text-xs">ADMIN</span>
                        <span th:if="${user.role == 'STUDENT'}" class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs">STUDENT</span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${user.enabled}" class="text-green-600">Active</span>
                        <span th:if="${!user.enabled}" class="text-red-600">Disabled</span>
                    </td>
                    <td class="px-6 py-4 space-x-2">
                        <form method="post" th:action="@{/admin/user/{id}/role(id=${user.id})}" class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <select name="role" class="text-sm border rounded px-2 py-1">
                                <option value="STUDENT" th:selected="${user.role == 'STUDENT'}">Student</option>
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                            </select>
                            <button type="submit" class="bg-indigo-500 text-white px-2 py-1 rounded text-sm">Update</button>
                        </form>
                        <form method="post" th:action="@{/admin/user/{id}/toggle(id=${user.id})}" class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" th:class="${user.enabled} ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'"
                                    class="text-white px-2 py-1 rounded text-sm">
                                <span th:if="${user.enabled}">Disable</span>
                                <span th:if="${!user.enabled}">Enable</span>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
