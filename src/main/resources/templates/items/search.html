<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Search Items')}"></head>
<body x-data="{ query: '', category: '', location: '', type: '' }">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 px-4">
    <!-- Search Filters -->
    <div class="bg-white shadow rounded-lg p-6 mb-8">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Search for Items</h2>
        <form method="get" th:action="@{/search}" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" name="query" placeholder="Search by title..." class="rounded-md border-gray-300 shadow-sm">
            <select name="category" class="rounded-md border-gray-300 shadow-sm">
                <option value="">All Categories</option>
                <option>Electronics</option><option>Documents</option><option>Keys</option>
                <option>Accessories</option><option>Clothing</option><option>Books</option>
                <option>Bags</option><option>Wallet/Purse</option><option>Phone</option><option>Other</option>
            </select>
            <input type="text" name="location" placeholder="Location..." class="rounded-md border-gray-300 shadow-sm">
            <select name="type" class="rounded-md border-gray-300 shadow-sm">
                <option value="">Both</option><option value="LOST">Lost Items</option><option value="FOUND">Found Items</option>
            </select>
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 md:col-span-4">Search</button>
        </form>
    </div>
    
    <!-- Search Results -->
    <div class="bg-white shadow rounded-lg overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-medium text-gray-900">Results</h3>
                <p class="text-sm text-gray-600" th:text="${#lists.size(items)} + ' item(s) found'"></p>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(items)}" class="text-center py-16">
            <i class="fas fa-search text-gray-400 text-6xl mb-4"></i>
            <p class="text-gray-500 text-lg">No items match your search criteria.</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-6">
            <div th:each="item : ${items}" class="border rounded-lg overflow-hidden hover:shadow-lg">
                <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                        <a th:href="@{/item/{id}(id=${item.id})}" class="text-lg font-semibold text-gray-900 hover:text-indigo-600" th:text="${item.title}"></a>
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                              th:class="${item.type == 'FOUND'} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                              th:text="${item.type}"></span>
                    </div>
                    
                    <p th:text="${item.category} + ' • ' + ${item.location}"></p>
                    <p class="text-sm text-gray-500 mb-3" th:text="${item.description?.length > 80 ? item.description.substring(0,80) + '...' : item.description}"></p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400" th:text="${item.createdAt}"></span>
                        <a th:href="@{/item/{id}(id=${item.id})}" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">View Details ?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
