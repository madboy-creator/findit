<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header"></head>
<body>

<div th:replace="fragments/header :: navbar"></div>

<div class="container" style="padding: 32px 24px; max-width: 800px;">
    <div class="card">
        <div class="card-header">📦 Report Found Item</div>
        <div class="card-body">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" enctype="multipart/form-data" th:action="@{/report-found}">
                <div class="form-group">
                    <label class="form-label">Item Title *</label>
                    <input type="text" name="title" class="form-control" required
                           placeholder="e.g., Black iPhone 13, Blue Water Bottle"/>
                </div>

                <!-- Fixed: category options match Item.getCategoryIcon() -->
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-select" required>
                        <option value="">Select category</option>
                        <option value="PHONE">📱 Phone</option>
                        <option value="LAPTOP">💻 Laptop</option>
                        <option value="ID_CARD">🪪 ID Card</option>
                        <option value="WATER_BOTTLE">💧 Water Bottle</option>
                        <option value="KEYS">🔑 Keys</option>
                        <option value="WALLET">👛 Wallet</option>
                        <option value="BOOK">📚 Book</option>
                        <option value="BAG">🎒 Bag</option>
                        <option value="GLASSES">👓 Glasses</option>
                        <option value="CHARGER">🔌 Charger</option>
                        <option value="OTHER">📦 Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Location Found *</label>
                    <input type="text" name="location" class="form-control" required
                           placeholder="e.g., Muhabura Hall, Library, Cafeteria"/>
                </div>

                <div class="form-group">
                    <label class="form-label">Description *</label>
                    <textarea name="description" class="form-control" rows="5" required
                              placeholder="Describe the item in detail - color, brand, condition, any distinctive marks..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Photo (Optional)</label>
                    <input type="file" name="photo" class="form-control"
                           accept="image/jpeg,image/png,image/jpg,image/webp"/>
                </div>

                <div style="display: flex; gap: 16px; margin-top: 8px;">
                    <button type="submit" class="btn btn-primary">Report Found Item</button>
                    <a href="/dashboard" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 32px; border-top: 1px solid #e5e7eb; margin-top: 32px;">
    <p>© 2024 FindIt - Campus Lost &amp; Found System | CST</p>
</footer>

</body>
</html>
