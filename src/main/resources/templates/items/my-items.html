<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('My Items')}"></head>
<body x-data="{ filterType: 'all' }">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 px-4">
    <div class="bg-white shadow rounded-lg overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 flex justify-between items-center flex-wrap gap-4">
            <div>
                <h2 class="text-2xl font-bold text-gray-900">My Reported Items</h2>
                <p class="text-sm text-gray-600 mt-1">Track and manage items you've reported</p>
            </div>
            <div class="flex gap-2">
                <a href="/report-lost" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 text-sm">+ Report Lost</a>
                <a href="/report-found" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 text-sm">+ Report Found</a>
            </div>
        </div>
        
        <!-- Filter tabs -->
        <div class="border-b border-gray-200 px-6">
            <div class="flex gap-4">
                <button @click="filterType = 'all'" :class="filterType === 'all' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-gray-500'" class="py-3 px-1 border-b-2 font-medium text-sm">All Items</button>
                <button @click="filterType = 'LOST'" :class="filterType === 'LOST' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-gray-500'" class="py-3 px-1 border-b-2 font-medium text-sm">Lost Items</button>
                <button @click="filterType = 'FOUND'" :class="filterType === 'FOUND' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-gray-500'" class="py-3 px-1 border-b-2 font-medium text-sm">Found Items</button>
            </div>
        </div>
        
        <div class="divide-y divide-gray-200">
            <div th:if="${#lists.isEmpty(items)}" class="text-center py-16">
                <i class="fas fa-box-open text-gray-400 text-6xl mb-4"></i>
                <p class="text-gray-500 text-lg">You haven't reported any items yet.</p>
                <a href="/report-lost" class="mt-4 inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Report Your First Item ?</a>
            </div>
            
            <div th:each="item : ${items}" x-show="filterType === 'all' || filterType === item.type" class="p-6 hover:bg-gray-50">
                <div class="flex flex-col md:flex-row justify-between gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <a th:href="@{/item/{id}(id=${item.id})}" class="text-lg font-semibold text-gray-900 hover:text-indigo-600" th:text="${item.title}"></a>
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                  th:class="${item.type == 'FOUND'} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                  th:text="${item.type}"></span>
                            <span th:if="${item.status == 'CLAIMED'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                <i class="fas fa-hand-holding-heart mr-1"></i> Claimed
                            </span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 text-sm mb-2">
                            <div><span class="text-gray-500">Category:</span> <span th:text="${item.category}"></span></div>
                            <div><span class="text-gray-500">Location:</span> <span th:text="${item.location}"></span></div>
                            <div><span class="text-gray-500">Reported:</span> <span th:text="${item.createdAt}"></span></div>
                        </div>
                        <div th:if="${item.description}" class="text-sm text-gray-600">
                            <span class="font-medium">Description:</span> 
                            <span th:text="${item.description.length() > 100} ? ${item.description.substring(0, 100) + '...'} : ${item.description}"></span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <form method="post" th:action="@{/item/{id}/delete(id=${item.id})}" onsubmit="return confirm('Delete this item?')">
                            
                            <button type="submit" class="px-3 py-1 text-sm border border-red-300 rounded-md text-red-700 hover:bg-red-50">
                                <i class="fas fa-trash mr-1"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
