<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Error')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="mb-8">
            <i class="fas fa-exclamation-triangle text-red-500 text-8xl"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-4" th:text="${status}">404</h1>
        <p class="text-xl text-gray-600 mb-8" th:text="${error}">Page Not Found</p>
        <p class="text-gray-500 mb-8" th:text="${message}">The page you're looking for doesn't exist.</p>
        <a href="/dashboard" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
            <i class="fas fa-home mr-2"></i> Return to Dashboard
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
