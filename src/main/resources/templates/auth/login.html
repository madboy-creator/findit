<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/simple-layout :: common-head('Sign In')}"></head>
<body>
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-2xl">
        <div><div class="flex justify-center"><i class="fas fa-search text-indigo-600 text-5xl"></i></div>
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Welcome Back</h2>
        <p class="mt-2 text-center text-sm text-gray-600">Or <a href="/register" class="font-medium text-indigo-600 hover:text-indigo-500">create a new account</a></p></div>
        <form class="mt-8 space-y-6" method="post" th:action="@{/perform_login}">
            <div th:if="${param.error}" class="rounded-md bg-red-50 p-4 text-red-800">Invalid email or password</div>
            <div class="rounded-md shadow-sm -space-y-px">
                <input type="email" name="email" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Email address">
                <input type="password" name="password" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Password">
            </div>
            <button type="submit" class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
