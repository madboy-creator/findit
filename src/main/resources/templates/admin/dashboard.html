<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Admin Dashboard')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="py-6 px-4">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Admin Dashboard</h1>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-lg shadow p-6"><div class="text-3xl font-bold text-indigo-600" th:text="${stats.totalUsers}">0</div><div class="text-gray-600">Total Users</div></div>
        <div class="bg-white rounded-lg shadow p-6"><div class="text-3xl font-bold text-green-600" th:text="${stats.foundItems}">0</div><div class="text-gray-600">Found Items</div></div>
        <div class="bg-white rounded-lg shadow p-6"><div class="text-3xl font-bold text-red-600" th:text="${stats.lostItems}">0</div><div class="text-gray-600">Lost Items</div></div>
        <div class="bg-white rounded-lg shadow p-6"><div class="text-3xl font-bold text-yellow-600" th:text="${stats.pendingClaims}">0</div><div class="text-gray-600">Pending Claims</div></div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
