<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: common-head('Edit User')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Edit User</h1>
            <a href="/admin/users" class="text-indigo-600 hover:text-indigo-800">? Back to Users</a>
        </div>
        
        <form th:action="@{/admin/users/edit/{id}(id=${user.id})}" method="post">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" name="name" th:value="${user.name}" required
                           class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" name="email" th:value="${user.email}" required
                           class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Student ID</label>
                    <input type="text" name="studentId" th:value="${user.studentId}"
                           class="w-full px-3 py-2 border rounded-md">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Phone</label>
                    <input type="tel" name="phone" th:value="${user.phone}"
                           class="w-full px-3 py-2 border rounded-md">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Role</label>
                    <select name="role" class="w-full px-3 py-2 border rounded-md">
                        <option value="STUDENT" th:selected="${user.role == 'STUDENT'}">Student</option>
                        <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">New Password</label>
                    <input type="password" name="newPassword" 
                           class="w-full px-3 py-2 border rounded-md"
                           placeholder="Leave blank to keep current">
                </div>
                
                <div class="flex items-center space-x-4">
                    <label class="flex items-center">
                        <input type="checkbox" name="enabled" th:checked="${user.enabled}" class="mr-2">
                        <span class="text-sm">Account Enabled</span>
                    </label>
                </div>
                
                <div class="flex justify-end space-x-3 pt-4">
                    <a href="/admin/users" class="px-4 py-2 border rounded-md hover:bg-gray-50">Cancel</a>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
                        Save Changes
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
