# PostgreSQL for Render, H2 for local
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:findit_db}
spring.datasource.driver-class-name=${DATABASE_URL:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}

# Dialect
spring.jpa.database-platform=${DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Console (only for local)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Server
server.port=${PORT:8081}